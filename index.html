<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bharat Villages — India Location Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --card:     #16161f;
      --border:   #23232e;
      --accent:   #f97316;
      --accent2:  #fb923c;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --success:  #22d3a8;
      --tag-bg:   #1e1e2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .4;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      padding: 48px 40px 0;
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }

    .logo-group { display: flex; flex-direction: column; gap: 4px; }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .tagline {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .stats-pill {
      display: flex; gap: 24px; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 20px;
      animation: fadeUp .6s ease both;
    }

    .stat { text-align: center; }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--accent);
    }
    .stat-label { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    .divider { width: 1px; height: 36px; background: var(--border); }

    /* ── MAIN CONTENT ── */
    main {
      position: relative; z-index: 2;
      max-width: 1100px; margin: 0 auto;
      padding: 40px 40px 60px;
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      position: relative;
      animation: fadeUp .5s ease both;
    }

    .search-icon {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 16px;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 18px 18px 18px 50px;
      font-family: 'DM Mono', monospace;
      font-size: 15px; color: var(--text);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,.12);
    }

    .search-badge {
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
      background: var(--tag-bg); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; padding: 4px 10px;
      border-radius: 6px; pointer-events: none;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; gap: 10px; align-items: center;
      margin-top: 14px; flex-wrap: wrap;
      animation: fadeUp .55s ease both;
    }

    .filter-label { font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    select {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 13px;
      padding: 8px 14px; outline: none; cursor: pointer;
      transition: border-color .2s;
    }
    select:focus { border-color: var(--accent); }

    .btn {
      padding: 9px 20px; border-radius: 10px;
      border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: .04em;
      transition: all .2s;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

    .btn-ghost {
      background: var(--tag-bg); color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin: 28px 0 16px;
      animation: fadeUp .6s ease both;
    }

    .result-count {
      font-size: 12px; color: var(--muted);
    }
    .result-count strong { color: var(--accent); font-family: 'Syne', sans-serif; }

    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: 14px; transition: all .2s;
    }
    .view-btn.active { background: var(--tag-bg); color: var(--text); border-color: var(--muted); }

    /* ── LOADING ── */
    #loading {
      display: none; text-align: center;
      padding: 80px 20px; color: var(--muted);
    }

    .spinner {
      width: 32px; height: 32px; margin: 0 auto 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── GRID VIEW ── */
    #list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      list-style: none;
      animation: fadeUp .4s ease both;
    }

    #list.list-view {
      grid-template-columns: 1fr;
    }

    #list li {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 14px;
      cursor: default;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      animation: fadeUp .3s ease both;
    }

    #list li:hover {
      border-color: rgba(249,115,22,.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .village-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--tag-bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .village-info { flex: 1; min-width: 0; }

    .village-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .village-state {
      font-size: 11px; color: var(--muted);
      margin-top: 4px; text-transform: uppercase;
      letter-spacing: .08em;
    }

    .state-badge {
      font-size: 10px; font-family: 'DM Mono', monospace;
      background: var(--tag-bg); border: 1px solid var(--border);
      color: var(--accent); padding: 3px 8px;
      border-radius: 6px; white-space: nowrap; flex-shrink: 0;
    }

    /* list-view specific */
    #list.list-view li {
      padding: 14px 20px;
      border-radius: 10px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 80px 20px;
      display: none;
    }
    .empty-emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); }
    .empty-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── PAGINATION ── */
    #pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 40px; flex-wrap: wrap;
      animation: fadeUp .5s ease both;
    }

    .page-btn {
      min-width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 13px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--accent); color: var(--text);
    }
    .page-btn.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }

    .page-info {
      font-size: 12px; color: var(--muted); padding: 0 8px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 12px 24px; border-radius: 12px;
      font-size: 13px; opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none; z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 2;
      text-align: center; padding: 20px;
      font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 28px 20px 0; }
      main   { padding: 28px 20px 48px; }
      .stats-pill { display: none; }
      #list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo">Bharat<span>Villages</span></div>
    <div class="tagline">India Location Data Explorer</div>
  </div>
  <div class="stats-pill" id="statsPill">
    <div class="stat">
      <div class="stat-val" id="totalCount">—</div>
      <div class="stat-label">Villages</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-val" id="stateCount">—</div>
      <div class="stat-label">States</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-val" id="currentShowing">0</div>
      <div class="stat-label">Showing</div>
    </div>
  </div>
</header>

<main>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search village or area name..." autocomplete="off"/>
    <span class="search-badge" id="searchBadge">570K+ records</span>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <select id="stateFilter">
      <option value="">All States</option>
    </select>
    <select id="limitSelect">
      <option value="50">50 per page</option>
      <option value="100" selected>100 per page</option>
      <option value="200">200 per page</option>
    </select>
    <button class="btn btn-primary" onclick="doSearch()">Search</button>
    <button class="btn btn-ghost" onclick="resetAll()">Reset</button>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="result-count" id="resultCount">Loading data…</div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">⊞</button>
      <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">☰</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;">Fetching records…</div>
  </div>

  <!-- Empty -->
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">🔍</div>
    <div class="empty-title">No villages found</div>
    <div class="empty-sub">Try a different name or clear filters</div>
  </div>

  <!-- Village List -->
  <ul id="list"></ul>

  <!-- Pagination -->
  <div id="pagination"></div>

</main>

<footer>
  Built for <span>Bluestock Internship</span> · India Address & Location API · 570K+ records
</footer>

<div id="toast"></div>

<script>
  const BASE = 'http://localhost:3000';
  let currentPage = 1;
  let totalPages = 1;
  let currentView = 'grid';
  let searchMode = false;
  let searchResults = [];
  let currentLimit = 100;

  const listEl    = document.getElementById('list');
  const loadingEl = document.getElementById('loading');
  const emptyEl   = document.getElementById('emptyState');
  const paginEl   = document.getElementById('pagination');
  const countEl   = document.getElementById('resultCount');
  const showingEl = document.getElementById('currentShowing');

  // ── Init ────────────────────────────────────────────────
  async function init() {
    await loadStats();
    await loadStates();
    await loadPage(1);
  }

  async function loadStats() {
    try {
      const res = await fetch(`${BASE}/villages/stats`);
      const d   = await res.json();
      document.getElementById('totalCount').textContent = d.totalVillages.toLocaleString('en-IN');
      document.getElementById('stateCount').textContent = d.totalStates;
      document.getElementById('searchBadge').textContent = `${(d.totalVillages/1000).toFixed(0)}K+ records`;
    } catch(e) { /* server may not have /stats yet */ }
  }

  async function loadStates() {
    try {
      const res = await fetch(`${BASE}/villages/states`);
      const states = await res.json();
      const sel = document.getElementById('stateFilter');
      states.forEach(s => {
        if (!s || s === 'Unknown') return;
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      });
    } catch(e) {}
  }

  // ── Load paginated data ──────────────────────────────────
  async function loadPage(page) {
    searchMode = false;
    currentLimit = parseInt(document.getElementById('limitSelect').value);
    showLoading(true);
    try {
      const res = await fetch(`${BASE}/villages/page?page=${page}&limit=${currentLimit}`);
      const d   = await res.json();
      currentPage = d.page;
      totalPages  = d.totalPages;
      renderList(d.data);
      renderPagination();
      countEl.innerHTML = `Showing <strong>${d.data.length}</strong> of <strong>${d.totalVillages.toLocaleString('en-IN')}</strong> villages`;
      showingEl.textContent = d.data.length;
    } catch(e) {
      showToast('⚠️ Could not connect to server. Is it running?');
      countEl.textContent = 'Server offline';
    }
    showLoading(false);
  }

  // ── Search ───────────────────────────────────────────────
  async function doSearch() {
    const q     = document.getElementById('search').value.trim();
    const state = document.getElementById('stateFilter').value;

    if (!q && !state) { resetAll(); return; }

    showLoading(true);
    try {
      // Always fetch from search or full list, then filter client-side by state
      let allResults = [];

      if (q) {
        // Name search — server returns up to 100 matches
        const res = await fetch(`${BASE}/villages/search?name=${encodeURIComponent(q)}`);
        allResults = await res.json();
      } else {
        // No name query — load more data to filter by state client-side
        const res = await fetch(`${BASE}/villages?limit=500`);
        allResults = await res.json();
      }

      searchMode = true;

      // Client-side state filter
      let filtered = allResults;
      if (state) {
        filtered = allResults.filter(v =>
          v.state.toLowerCase() === state.toLowerCase() ||
          v.state.toLowerCase().includes(state.toLowerCase())
        );
      }

      renderList(filtered);
      paginEl.innerHTML = '';
      countEl.innerHTML = `<strong>${filtered.length}</strong> result${filtered.length !== 1 ? 's' : ''} found`;
      showingEl.textContent = filtered.length;
      if (filtered.length === 0) {
        emptyEl.style.display = 'block';
        // Show hint about truncated state names
        document.querySelector('.empty-sub').textContent =
          `State "${state}" ka data CSV mein differently stored hai. Try searching by name instead.`;
      }
    } catch(e) {
      showToast('⚠️ Search failed. Check server connection.');
    }
    showLoading(false);
  }

  function resetAll() {
    document.getElementById('search').value = '';
    document.getElementById('stateFilter').value = '';
    searchMode = false;
    loadPage(1);
  }

  // ── Render ───────────────────────────────────────────────
  const ICONS = ['🏘️','🌾','🏡','🌿','🏔️','🌊','🌴','🌻'];
  function getIcon(name) { return ICONS[name.charCodeAt(0) % ICONS.length]; }

  function renderList(data) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'none';

    if (!data || data.length === 0) {
      emptyEl.style.display = 'block'; return;
    }

    data.forEach((v, i) => {
      const li = document.createElement('li');
      li.style.animationDelay = `${Math.min(i * 0.015, 0.4)}s`;
      li.innerHTML = `
        <div class="village-icon">${getIcon(v.name)}</div>
        <div class="village-info">
          <div class="village-name" title="${v.name}">${v.name}</div>
          <div class="village-state">${v.state}</div>
        </div>
        <span class="state-badge">${v.state.slice(0,4).toUpperCase()}</span>
      `;
      listEl.appendChild(li);
    });
  }

  // ── Pagination ───────────────────────────────────────────
  function renderPagination() {
    paginEl.innerHTML = '';
    if (totalPages <= 1) return;

    const makeBtn = (label, page, disabled, active) => {
      const b = document.createElement('button');
      b.className = 'page-btn' + (active ? ' active' : '');
      b.textContent = label;
      b.disabled = disabled;
      if (!disabled && !active) b.onclick = () => loadPage(page);
      return b;
    };

    paginEl.appendChild(makeBtn('‹', currentPage - 1, currentPage === 1));

    let pages = [];
    if (totalPages <= 7) {
      pages = Array.from({length: totalPages}, (_, i) => i + 1);
    } else {
      pages = [1];
      if (currentPage > 3) pages.push('…');
      for (let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++) pages.push(i);
      if (currentPage < totalPages - 2) pages.push('…');
      pages.push(totalPages);
    }

    pages.forEach(p => {
      if (p === '…') {
        const span = document.createElement('span');
        span.className = 'page-info'; span.textContent = '…';
        paginEl.appendChild(span);
      } else {
        paginEl.appendChild(makeBtn(p, p, false, p === currentPage));
      }
    });

    paginEl.appendChild(makeBtn('›', currentPage + 1, currentPage === totalPages));

    const info = document.createElement('span');
    info.className = 'page-info';
    info.textContent = `Page ${currentPage} of ${totalPages.toLocaleString('en-IN')}`;
    paginEl.appendChild(info);
  }

  // ── Helpers ──────────────────────────────────────────────
  function showLoading(show) {
    loadingEl.style.display = show ? 'block' : 'none';
    if (show) listEl.innerHTML = '';
  }

  function setView(v) {
    currentView = v;
    listEl.classList.toggle('list-view', v === 'list');
    document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
    document.getElementById('listBtn').classList.toggle('active', v === 'list');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Key bindings ─────────────────────────────────────────
  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
    if (e.key === 'Escape') resetAll();
  });

  document.getElementById('limitSelect').addEventListener('change', () => {
    if (!searchMode) loadPage(1);
  });

  init();
</script>
</body>
</html>
